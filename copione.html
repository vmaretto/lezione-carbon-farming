<style>
  :root{

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--ink); display:flex; flex-direction:column; overflow:hidden;}
  header{padding:14px 18px 10px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:12px;}
  header h1{font-size:1rem; color:var(--green);}
  header .clock{margin-left:auto; font-variant-numeric:tabular-nums; font-size:1.1rem; color:var(--amber); font-weight:700;}
  #main{flex:1; overflow-y:auto; padding:18px; -webkit-overflow-scrolling:touch;}
  .kick{font-size:.8rem; text-transform:uppercase; letter-spacing:.14em; color:var(--teal); margin-bottom:4px;}
  h2{font-size:1.7rem; margin-bottom:4px; line-height:1.2;}
  .time-badge{display:inline-block; background:var(--card2); color:var(--amber); font-weight:800; padding:3px 12px; border-radius:20px; font-size:1rem; margin:6px 0 14px;}
  .scena{background:var(--card); border:1px dashed var(--border); border-radius:12px; padding:12px 16px; font-size:1rem; color:var(--ink-dim); margin-bottom:16px; line-height:1.5;}
  .scena b{color:var(--ink);}
  .bub{background:linear-gradient(160deg,var(--card2),var(--card)); border:1px solid var(--green); border-radius:18px 18px 18px 4px; padding:16px 18px; margin-bottom:14px; font-size:1.15rem; line-height:1.6;}
  .bub .who{display:block; font-size:.74rem; text-transform:uppercase; letter-spacing:.12em; color:var(--teal); margin-bottom:6px;}
  .bub b{color:var(--green);}
  .bub i{color:var(--ink-dim);}
  footer{display:flex; gap:10px; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); align-items:center;}
  button{font-family:inherit; border:none; border-radius:14px; font-size:1.15rem; font-weight:700; padding:16px 10px; cursor:pointer;}
  #prev{flex:1; background:var(--card); color:var(--ink-dim); border:1px solid var(--border);}
  #next{flex:2; background:linear-gradient(90deg,#10b981,var(--teal)); color:#06281e;}
  #where{font-size:.85rem; color:var(--ink-faint); min-width:64px; text-align:center;}
  #bar{height:4px; background:var(--card);}
  #bar div{height:100%; background:linear-gradient(90deg,var(--green),var(--teal)); width:0%; transition:width .3s;}
</style>
</head>

let i=0;
const main=document.getElementById('main');
function render(){
  const s=S[i];
  main.innerHTML=`<p class="kick">${s.k}</p><h2>${s.k.split('·').pop().trim()}</h2>
    ${s.t?`<span class="time-badge">⏱ ${s.t}</span>`:'<div style="height:10px"></div>'}
    <div class="scena">🖥️ ${s.scena}</div>`+
    s.b.map(b=>`<div class="bub"><span class="who">${b[0]}</span>${b[1]}</div>`).join('');
  document.getElementById('where').textContent=(i+1)+' / '+S.length;
  document.getElementById('barfill').style.width=(i/(S.length-1)*100)+'%';
  main.scrollTop=0;
}
document.getElementById('next').onclick=()=>{if(i<S.length-1){i++;render();}};
document.getElementById('prev').onclick=()=>{if(i>0){i--;render();}};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') document.getElementById('next').click();
  if(e.key==='ArrowLeft') document.getElementById('prev').click();
});
/* swipe */
let x0=null;
document.addEventListener('touchstart',e=>x0=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
  if(x0===null) return;
  const dx=e.changedTouches[0].clientX-x0;
  if(dx<-60) document.getElementById('next').click();
  if(dx>60) document.getElementById('prev').click();
  x0=null;
});
/* lesson clock */
const t0=Date.now();
setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000);
  document.getElementById('clock').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},1000);
render();
</script>
</body>
</html>
